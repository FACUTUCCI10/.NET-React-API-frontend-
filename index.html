<!-- 
  index.html
  
  Estructura HTML base de la aplicación. 
  Aquí es donde se define el contenedor principal 'root' donde React se montará.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Icono de la pestaña del navegador -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Configuración del viewport para asegurar la adaptabilidad en dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título de la página que aparece en la pestaña del navegador -->
    <title>Vite + React + TS</title>
  </head>
  <body>
    <!-- Contenedor raíz donde React inyecta todo el árbol de componentes -->
    <div id="root"></div>
    
    <!-- Script que carga el punto de entrada principal (main.tsx) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
